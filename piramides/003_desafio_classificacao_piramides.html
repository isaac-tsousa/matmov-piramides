<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio das Pirâmides - MATMOV</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #fffaf1; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }

        /* Painel Superior de Instruções */
        #top-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 15px 30px; border-radius: 30px;
            border: 2px solid #d4af37; z-index: 20; box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center; font-weight: bold; color: #005088; font-size: 1.1rem;
        }

        /* Painel de Exibição da Resposta Oculta/Revelada */
        #answer-panel {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 20px 40px; border-radius: 12px;
            border: 2px solid #005088; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center; min-width: 350px; display: flex; flex-direction: column; align-items: center;
        }
        #answer-panel h3 { margin: 0 0 5px 0; color: #555; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        #answer-text { font-size: 1.6rem; color: #d4af37; font-weight: bold; margin: 5px 0; text-shadow: 1px 1px 0 #005088; }
        #stats-text { font-size: 0.85rem; color: #7f8c8d; margin-top: 5px; font-style: italic; }

        /* Painel de Controles Inferior */
        #controls-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 20px 35px; border-radius: 15px;
            border: 2px solid #d4af37; z-index: 10; min-width: 550px; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex; justify-content: center; gap: 15px;
        }
        
        button.ctrl-btn {
            background: #f8f9fa; border: 2px solid #bdc3c7; padding: 14px 24px; font-size: 1.05rem;
            border-radius: 8px; cursor: pointer; font-weight: bold; color: #2c3e50; transition: all 0.2s;
        }
        button.ctrl-btn:hover { background: #eee; transform: translateY(-2px); }
        
        #btn-generate { background: #005088; color: white; border-color: #003d66; }
        #btn-generate:hover { background: #003d66; box-shadow: 0 4px 15px rgba(0, 80, 136, 0.3); }
        
        #btn-reveal { background: #d4af37; color: white; border-color: #b8860b; }
        #btn-reveal:hover { background: #b8860b; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }

        /* Labels dos Vértices */
        .vertex-label {
            position: absolute; color: #005088; font-weight: 900; font-size: 1.1rem;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            pointer-events: none; z-index: 5;
        }

        .instrucao {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.8);
            padding: 10px 15px; border-radius: 8px; font-size: 0.85rem; color: #555;
            border: 1px solid #d4af37; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="top-panel">
        🎯 Desafio de Fixação: Qual é a Classificação desta Pirâmide?
    </div>

    <div id="answer-panel">
        <h3>Classificação Atual</h3>
        <div id="answer-text">❓❓❓</div>
        <div id="stats-text">Clique em "Revelar Resposta" para conferir!</div>
    </div>

    <div class="instrucao">🖱️ Clique e arraste para rotacionar o cenário</div>

    <div id="labels-container"></div>
    <div id="canvas-container"></div>

    <div id="controls-panel">
        <button class="ctrl-btn" id="btn-generate" onclick="generateRandomPyramid()">🎲 Gerar Pirâmide Aleatória</button>
        <button class="ctrl-btn" id="btn-reveal" onclick="revealAnswer()">👁️ Revelar Resposta</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // ESTADO GLOBAL DO SIMULADOR
        let currentSides = 4;
        let currentType = 'Reta';
        let answerRevealed = false;
        let labels = [];

        // NOMENCLATURAS EM PORTUGUÊS
        const namesMap = {
            3: "Triangular",
            4: "Quadrangular",
            5: "Pentagonal",
            6: "Hexagonal",
            7: "Heptagonal",
            8: "Octogonal"
        };

        // SETUP DO SCENARIO 3D (THREE.JS)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfffaf1); // Fundo Areia Clara Egípcia
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 10, 16);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2, 0);

        // ILUMINAÇÃO INTELIGENTE
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffeaa7, 1.1);
        sun.position.set(10, 25, 10);
        scene.add(sun);
        
        // Piso Quadriculado de Referência Espacial
        scene.add(new THREE.GridHelper(24, 24, 0xd4af37, 0xe5e5e5));

        // Grupo Contêiner da Pirâmide Dinâmica
        let pyramidGroup = new THREE.Group();
        scene.add(pyramidGroup);

        function clearLabels() {
            labels.forEach(l => l.element.remove());
            labels = [];
        }

        function createLabel(text, pos) {
            const div = document.createElement('div');
            div.className = 'vertex-label';
            div.innerText = text;
            document.getElementById('labels-container').appendChild(div);
            labels.push({ element: div, pos: pos });
        }

        // MOTOR DE CONSTRUÇÃO GEOMÉTRICA DA PIRÂMIDE
        function buildPyramid() {
            // Limpar objetos 3D e rótulos anteriores
            while(pyramidGroup.children.length > 0) pyramidGroup.remove(pyramidGroup.children[0]);
            clearLabels();

            const radius = 5;
            const heightValue = 7.5;
            const basePoints = [];

            // 1. Plotar Vértices da Base Poligonal Regular
            for (let i = 0; i < currentSides; i++) {
                const angle = (i / currentSides) * Math.PI * 2;
                const p = new THREE.Vector3(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
                basePoints.push(p);
                // Nomeia de A até H dinamicamente
                createLabel(String.fromCharCode(65 + i), p.clone().add(new THREE.Vector3(0, -0.4, 0)));
            }

            // 2. Definir Posição do Ápice (Vértice V) com base na Inclinação
            let apexPos;
            if (currentType === 'Oblíqua') {
                // Sorteia uma direção de inclinação bem visível para não coincidir perfeitamente com eixos principais
                const randomAngle = Math.random() * Math.PI * 2;
                const offsetDist = 3.5 + Math.random() * 1.5; // Deslocamento nítido
                apexPos = new THREE.Vector3(Math.cos(randomAngle) * offsetDist, heightValue, Math.sin(randomAngle) * offsetDist);
            } else {
                // Perfeitamente Centralizado
                apexPos = new THREE.Vector3(0, heightValue, 0);
            }
            createLabel('V', apexPos.clone().add(new THREE.Vector3(0, 0.4, 0)));

            // 3. MATERIAIS SÓLIDOS (Estilo Canos 3D para Arestas)
            const matEdge = new THREE.MeshBasicMaterial({ color: 0xe84118 }); // Vermelho Terracota
            const matFace = new THREE.MeshPhongMaterial({ color: 0xd4af37, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
            const matBasePlane = new THREE.MeshBasicMaterial({ color: 0x005088, transparent: true, opacity: 0.12 });

            // Helper para gerar arestas volumosas (Cilindros)
            function addThickEdge(p1, p2) {
                const distance = p1.distanceTo(p2);
                const cylinderGeo = new THREE.CylinderGeometry(0.08, 0.08, distance, 8);
                const mesh = new THREE.Mesh(cylinderGeo, matEdge);
                mesh.position.copy(p1.clone().add(p2).multiplyScalar(0.5));
                mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), p2.clone().sub(p1).normalize());
                pyramidGroup.add(mesh);
            }

            // 4. CONSTRUÇÃO E REVESTIMENTO DAS FACES E ARESTAS
            for (let i = 0; i < currentSides; i++) {
                const next = (i + 1) % currentSides;
                
                // Construir "Esqueleto" das Arestas
                addThickEdge(basePoints[i], basePoints[next]); // Aresta perimetral da base
                addThickEdge(basePoints[i], apexPos);         // Aresta lateral inclinada

                // Tecido das Faces Laterais
                const faceGeometry = new THREE.BufferGeometry();
                faceGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
                    basePoints[i].x, basePoints[i].y, basePoints[i].z,
                    basePoints[next].x, basePoints[next].y, basePoints[next].z,
                    apexPos.x, apexPos.y, apexPos.z
                ]), 3));
                faceGeometry.computeVertexNormals();
                pyramidGroup.add(new THREE.Mesh(faceGeometry, matFace));
            }

            // 5. TRAÇADO DA LINHA DE ALTURA (h) PERPENDICULAR AO PLANO DA BASE
            const projectionBase = new THREE.Vector3(apexPos.x, 0, apexPos.z);
            const heightGeometry = new THREE.BufferGeometry().setFromPoints([projectionBase, apexPos]);
            // Linha preta pontilhada interna demonstrando a projeção ortogonal
            const dashedLine = new THREE.LineSegments(heightGeometry, new THREE.LineDashedMaterial({ color: 0x2c3e50, dashSize: 0.4, gapSize: 0.2 }));
            dashedLine.computeLineDistances();
            pyramidGroup.add(dashedLine);
            
            // Ponto marcador no pé da perpendicular da altura
            const heightFoot = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), new THREE.MeshBasicMaterial({color: 0x2c3e50}));
            heightFoot.position.copy(projectionBase);
            pyramidGroup.add(heightFoot);
        }

        // GERADOR DINÂMICO CONFORME RESTRIÇÕES PEDAGÓGICAS SOLICITADAS
        function generateRandomPyramid() {
            // 1. Escolha uniforme do polígono da base entre 3 e 8 lados
            currentSides = Math.floor(Math.random() * 6) + 3; // Gera [3, 4, 5, 6, 7, 8]

            // 2. Proporção matemática estrita de 2 para 1 para inclinação reta
            // Sorteia um número de 0 a 2. Se for 0 ou 1 -> Reta. Se for 2 -> Oblíqua.
            const roll = Math.floor(Math.random() * 3);
            if (roll === 2) {
                currentType = 'Oblíqua';
            } else {
                currentType = 'Reta';
            }

            // Oculta a resposta para criar o desafio
            answerRevealed = false;
            document.getElementById('answer-text').innerText = "❓ ❓ ❓";
            document.getElementById('answer-text').style.color = "#7f8c8d";
            document.getElementById('stats-text').innerText = "Uma nova estrutura surgiu! Qual é a sua classificação?";

            // Reconstrói o modelo 3D
            buildPyramid();
        }

        // REVELAR A RESPOSTA CORRETA E ATUALIZAR INTERFACE
        function revealAnswer() {
            answerRevealed = true;
            const finalName = "Pirâmide " + namesMap[currentSides] + " " + currentType;
            
            const txtEl = document.getElementById('answer-text');
            txtEl.innerText = finalName;
            txtEl.style.color = currentType === 'Reta' ? '#005088' : '#e84118';

            document.getElementById('stats-text').innerText = `Base: Polígono de ${currentSides} lados | Vértice: Projeção ${currentType === 'Reta' ? 'Central' : 'Deslocada'}`;
        }

        // LOOP DE ANIMAÇÃO CONTÍNUA (FPS DO WEBGL)
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Sincroniza projeção bidimensional das tags HTML com as coordenadas 3D do mundo
            labels.forEach(label => {
                const vector = label.pos.clone();
                vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = -(vector.y * 0.5 - 0.5) * window.innerHeight;
                label.element.style.left = `${x}px`;
                label.element.style.top = `${y}px`;
                label.element.style.display = (vector.z > 1) ? 'none' : 'block';
            });

            renderer.render(scene, camera);
        }

        // COMPORTAMENTO RESPONSIVO DA TELA
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // INICIALIZAÇÃO AUTOMÁTICA DA PRIMEIRA PIRÂMIDE AO CARREGAR
        generateRandomPyramid();
        animate();
    </script>
</body>
</html>
