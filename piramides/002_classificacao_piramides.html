<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificação de Pirâmides - MATMOV</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #fffaf1; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }

        /* Estilo das Abas Superior */
        #tab-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(255, 255, 255, 0.9); border-radius: 50px;
            padding: 5px; border: 2px solid #d4af37; z-index: 20; box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .tab {
            padding: 10px 25px; cursor: pointer; border-radius: 40px; font-weight: bold;
            color: #005088; transition: 0.3s; border: none; background: none; font-size: 1rem;
        }
        .tab.active { background: #d4af37; color: white; }

        /* Painel Lateral de Info */
        #side-panel {
            position: absolute; top: 90px; left: 20px; width: 300px;
            background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 12px;
            border: 2px solid #d4af37; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #side-panel h3 { margin: 0 0 10px 0; color: #005088; text-transform: uppercase; font-size: 1.1rem; }
        #side-panel p { font-size: 0.95rem; color: #333; line-height: 1.4; margin: 0; }

        /* Painel de Controles Inferior */
        #controls-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 15px;
            border: 2px solid #d4af37; z-index: 10; min-width: 500px; text-align: center;
        }
        .btn-group { display: none; justify-content: center; gap: 10px; }
        .btn-group.active { display: flex; }
        
        button.ctrl-btn {
            background: #f8f9fa; border: 1px solid #bdc3c7; padding: 12px 18px;
            border-radius: 8px; cursor: pointer; font-weight: bold; color: #2c3e50; transition: 0.2s;
        }
        button.ctrl-btn:hover { background: #eee; }
        button.ctrl-btn.active { background: #005088; color: white; border-color: #003d66; }

        /* Labels dos Vértices */
        .vertex-label {
            position: absolute; color: #005088; font-weight: 900; font-size: 1rem;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            pointer-events: none; z-index: 5;
        }

        .instrucao {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.8);
            padding: 10px 15px; border-radius: 8px; font-size: 0.85rem; color: #555;
            border: 1px solid #d4af37; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="tab-bar">
        <button class="tab active" onclick="switchTab('natureza')">1. Quanto à Natureza</button>
        <button class="tab" onclick="switchTab('inclinacao')">2. Quanto à Inclinação</button>
    </div>

    <div id="side-panel">
        <h3 id="panel-title">Pirâmide Quadrangular</h3>
        <p id="panel-desc">A natureza de uma pirâmide é definida pelo polígono da sua base.</p>
    </div>

    <div class="instrucao">🖱️ Gire para ver a profundidade</div>

    <div id="labels-container"></div>
    <div id="canvas-container"></div>

    <div id="controls-panel">
        <div id="group-natureza" class="btn-group active">
            <button class="ctrl-btn" onclick="setSides(3)">Triangular (3)</button>
            <button class="ctrl-btn active" onclick="setSides(4)">Quadrangular (4)</button>
            <button class="ctrl-btn" onclick="setSides(5)">Pentagonal (5)</button>
            <button class="ctrl-btn" onclick="setSides(6)">Hexagonal (6)</button>
        </div>
        <div id="group-inclinacao" class="btn-group">
            <button class="ctrl-btn active" onclick="setInclination(false)">Pirâmide Reta</button>
            <button class="ctrl-btn" onclick="setInclination(true)">Pirâmide Oblíqua</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // ESTADO GLOBAL
        let sides = 4;
        let isOblique = false;
        let labels = [];

        // SETUP THREE.JS
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfffaf1);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 10, 15);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2, 0);

        // LUZES
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffeaa7, 1.0);
        sun.position.set(10, 20, 10);
        scene.add(sun);
        scene.add(new THREE.GridHelper(20, 20, 0xd4af37, 0xe5e5e5));

        // GRUPOS
        let pyramidGroup = new THREE.Group();
        scene.add(pyramidGroup);

        function clearLabels() {
            labels.forEach(l => l.element.remove());
            labels = [];
        }

        function createLabel(text, pos) {
            const div = document.createElement('div');
            div.className = 'vertex-label';
            div.innerText = text;
            document.getElementById('labels-container').appendChild(div);
            labels.push({ element: div, pos: pos });
        }

        function buildPyramid() {
            // Limpar anterior
            while(pyramidGroup.children.length > 0) pyramidGroup.remove(pyramidGroup.children[0]);
            clearLabels();

            const radius = 5;
            const hVal = 7;
            const basePoints = [];

            // Gerar pontos da base
            for (let i = 0; i < sides; i++) {
                const angle = (i / sides) * Math.PI * 2;
                const p = new THREE.Vector3(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
                basePoints.push(p);
                createLabel(String.fromCharCode(65 + i), p.clone().add(new THREE.Vector3(0, -0.5, 0)));
            }

            // Gerar Vértice Superior
            const apexPos = isOblique ? new THREE.Vector3(4, hVal, 3) : new THREE.Vector3(0, hVal, 0);
            createLabel('V', apexPos.clone().add(new THREE.Vector3(0, 0.5, 0)));

            // MATERIAIS
            const matEdge = new THREE.MeshBasicMaterial({ color: 0xe84118 }); // Vermelho Egípcio
            const matFace = new THREE.MeshPhongMaterial({ color: 0xd4af37, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
            const matBase = new THREE.MeshBasicMaterial({ color: 0x005088, transparent: true, opacity: 0.1 });

            // FUNÇÃO AUXILIAR: TUBO PARA ARESTA
            function addTube(p1, p2) {
                const d = p1.distanceTo(p2);
                const geo = new THREE.CylinderGeometry(0.08, 0.08, d, 8);
                const mesh = new THREE.Mesh(geo, matEdge);
                mesh.position.copy(p1.clone().add(p2).multiplyScalar(0.5));
                mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), p2.clone().sub(p1).normalize());
                pyramidGroup.add(mesh);
            }

            // DESENHAR ARESTAS E FACES
            for (let i = 0; i < sides; i++) {
                const next = (i + 1) % sides;
                
                // Aresta Base
                addTube(basePoints[i], basePoints[next]);
                // Aresta Lateral
                addTube(basePoints[i], apexPos);

                // Face Lateral
                const fGeo = new THREE.BufferGeometry();
                fGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
                    basePoints[i].x, basePoints[i].y, basePoints[i].z,
                    basePoints[next].x, basePoints[next].y, basePoints[next].z,
                    apexPos.x, apexPos.y, apexPos.z
                ]), 3));
                fGeo.computeVertexNormals();
                pyramidGroup.add(new THREE.Mesh(fGeo, matFace));
            }

            // Altura (Tracejada)
            const hBase = isOblique ? new THREE.Vector3(apexPos.x, 0, apexPos.z) : new THREE.Vector3(0,0,0);
            const hGeo = new THREE.BufferGeometry().setFromPoints([hBase, apexPos]);
            const hLine = new THREE.LineSegments(hGeo, new THREE.LineDashedMaterial({ color: 0x000000, dashSize: 0.4, gapSize: 0.2 }));
            hLine.computeLineDistances();
            pyramidGroup.add(hLine);
            
            // Marcar o centro da base ou projeção
            const centerMesh = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0x000000}));
            centerMesh.position.copy(hBase);
            pyramidGroup.add(centerMesh);
        }

        // LÓGICA DE INTERFACE
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.btn-group').forEach(g => g.classList.remove('active'));
            
            const btn = document.querySelector(`.tab[onclick*="${tabId}"]`);
            btn.classList.add('active');
            document.getElementById('group-' + tabId).classList.add('active');

            const desc = document.getElementById('panel-desc');
            if(tabId === 'natureza') {
                desc.innerText = "A natureza de uma pirâmide é definida pelo polígono da sua base (Triangular, Quadrangular, etc).";
            } else {
                desc.innerText = "Reta: O vértice está alinhado ao centro da base. Oblíqua: O vértice está deslocado lateralmente.";
            }
        }

        function setSides(n) {
            sides = n;
            const names = ["", "", "", "Triangular", "Quadrangular", "Pentagonal", "Hexagonal"];
            document.getElementById('panel-title').innerText = "Pirâmide " + names[n];
            document.querySelectorAll('#group-natureza button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            buildPyramid();
        }

        function setInclination(val) {
            isOblique = val;
            document.querySelectorAll('#group-inclinacao button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            buildPyramid();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            labels.forEach(label => {
                const vector = label.pos.clone();
                vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = -(vector.y * 0.5 - 0.5) * window.innerHeight;
                label.element.style.left = `${x}px`;
                label.element.style.top = `${y}px`;
                label.element.style.display = (vector.z > 1) ? 'none' : 'block';
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        buildPyramid();
        animate();
    </script>
</body>
</html>
