<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Interativo: Pirâmide Hexagonal - Matmov</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fffaf1; 
        }
        
        #canvas-container { width: 100vw; height: 100vh; display: block; }

        /* Painel Lateral de Informação */
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 320px;
            border: 2px solid #d4af37;
            z-index: 10;
        }

        #info-panel h3 { margin: 0 0 10px 0; color: #005088; text-transform: uppercase; }
        #info-content { font-size: 1rem; color: #333; line-height: 1.5; }

        /* Painel de Controles Inferior */
        #ui-panel {
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); 
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
            text-align: center; 
            min-width: 800px;
            border: 2px solid #d4af37; 
            z-index: 10;
        }
        
        .controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        
        button {
            background: #f8f9fa; border: 1px solid #bdc3c7; padding: 10px 15px; font-size: 0.95rem;
            border-radius: 8px; cursor: pointer; color: #2c3e50; font-weight: bold; transition: all 0.2s;
        }
        button:hover { background: #eee; transform: translateY(-2px); }
        button.active { background: #d4af37; color: white; border-color: #b8860b; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.4); }

        /* Rótulos dos vértices em 3D */
        .vertex-label {
            position: absolute; color: #005088; font-weight: 900; font-size: 1.2rem;
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            pointer-events: none; transform: translate(-50%, -50%); z-index: 5;
        }

        /* Instrução de giro */
        .instrucao {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9);
            padding: 15px; border-radius: 8px; color: #2f3542; font-size: 0.95rem; text-align: right;
            pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); line-height: 1.5; border: 1px solid #e2e8f0;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="instrucao">
        💡 <b>Dica:</b><br>
        Clique e arraste para girar a pirâmide<br>e analisar as arestas de perto!
    </div>

    <div id="labels-container"></div>
    <div id="canvas-container"></div>

    <div id="info-panel">
        <h3 id="info-title">Elementos da Pirâmide</h3>
        <div id="info-content">Clique nos botões abaixo para explorar a anatomia da pirâmide hexagonal.</div>
    </div>

    <div id="ui-panel">
        <div class="controls">
            <button onclick="highlight('Tudo')" id="btn-Tudo" class="active">Visão Geral</button>
            <button onclick="highlight('Vertice')" id="btn-Vertice">Vértice (H)</button>
            <button onclick="highlight('Base')" id="btn-Base">Base</button>
            <button onclick="highlight('Faces')" id="btn-Faces">Faces Laterais</button>
            <button onclick="highlight('ArestasBase')" id="btn-ArestasBase">Arestas da Base</button>
            <button onclick="highlight('ArestasLat')" id="btn-ArestasLat">Arestas Laterais</button>
            <button onclick="highlight('Altura')" id="btn-Altura">Altura (h)</button>
        </div>
    </div>

    <script>
        // Configuração da Cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfffaf1);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 10, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 3, 0); // Foca um pouco mais acima do chão

        // Luzes
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // Chão (Grid)
        const grid = new THREE.GridHelper(20, 20, 0xd4af37, 0xe5e5e5);
        scene.add(grid);

        // Geometria Base
        const radius = 5;
        const height = 8;
        const verticesBase = [];
        const labels = [];
        const labelsContainer = document.getElementById('labels-container');

        const names = ['A', 'B', 'C', 'D', 'E', 'F'];
        for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2;
            verticesBase.push(new THREE.Vector3(Math.cos(angle) * radius, 0, Math.sin(angle) * radius));

            const div = document.createElement('div');
            div.className = 'vertex-label';
            div.innerText = names[i];
            labelsContainer.appendChild(div);
            labels.push({ element: div, pos: verticesBase[i].clone().add(new THREE.Vector3(0, -0.5, 0)) });
        }

        const vH = new THREE.Vector3(0, height, 0);
        const divH = document.createElement('div');
        divH.className = 'vertex-label';
        divH.innerText = 'H';
        labelsContainer.appendChild(divH);
        labels.push({ element: divH, pos: vH.clone().add(new THREE.Vector3(0, 0.5, 0)) });

        // Grupos
        const groupFaces = new THREE.Group();
        const groupArestasBase = new THREE.Group();
        const groupArestasLat = new THREE.Group();
        const groupBasePlane = new THREE.Group();
        const groupHeight = new THREE.Group();
        const groupVertex = new THREE.Group();

        // 1. Vértice (Esfera)
        const sphereH = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshBasicMaterial({ color: 0x005088 }));
        sphereH.position.copy(vH);
        groupVertex.add(sphereH);

        // 2. Base
        const baseShape = new THREE.Shape();
        baseShape.moveTo(verticesBase[0].x, verticesBase[0].z);
        for(let i=1; i<6; i++) baseShape.lineTo(verticesBase[i].x, verticesBase[i].z);
        baseShape.closePath();
        const baseMesh = new THREE.Mesh(new THREE.ShapeGeometry(baseShape), new THREE.MeshBasicMaterial({ color: 0x005088, transparent: true, opacity: 0.15, side: THREE.DoubleSide }));
        baseMesh.rotation.x = Math.PI / 2;
        groupBasePlane.add(baseMesh);

        // FUNÇÃO NOVA: Criar cilindros grossos para as Arestas!
        function createThickEdge(p1, p2) {
            const dist = p1.distanceTo(p2);
            // Cilindro com espessura 0.08
            const geo = new THREE.CylinderGeometry(0.08, 0.08, dist, 8);
            const mat = new THREE.MeshBasicMaterial({ color: 0x2c3e50, transparent: true, opacity: 0.4 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5));
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3().subVectors(p2, p1).normalize());
            return mesh;
        }

        // 3. Arestas da Base (Cilindros)
        for (let i = 0; i < 6; i++) {
            const next = (i + 1) % 6;
            groupArestasBase.add(createThickEdge(verticesBase[i], verticesBase[next]));
        }

        // 4. Arestas Laterais e Faces
        for (let i = 0; i < 6; i++) {
            const next = (i + 1) % 6;
            
            // Arestas Laterais (Cilindros)
            groupArestasLat.add(createThickEdge(verticesBase[i], vH));

            // Faces
            const faceGeo = new THREE.BufferGeometry();
            faceGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
                verticesBase[i].x, verticesBase[i].y, verticesBase[i].z,
                verticesBase[next].x, verticesBase[next].y, verticesBase[next].z,
                vH.x, vH.y, vH.z
            ]), 3));
            faceGeo.computeVertexNormals();
            groupFaces.add(new THREE.Mesh(faceGeo, new THREE.MeshPhongMaterial({ color: 0xd4af37, transparent: true, opacity: 0.2, side: THREE.DoubleSide })));
        }

        // 5. Altura (Cilindro Tracejado improvisado com textura ou esferas, mas linha é melhor para tracejado)
        const geoHeight = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), vH]);
        const lineH = new THREE.LineSegments(geoHeight, new THREE.LineDashedMaterial({ color: 0xe84118, dashSize: 0.4, gapSize: 0.2, linewidth: 2 }));
        lineH.computeLineDistances();
        groupHeight.add(lineH);

        scene.add(groupFaces, groupArestasBase, groupArestasLat, groupBasePlane, groupHeight, groupVertex);

        // Lógica de Destaque
        function highlight(type) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');

            const title = document.getElementById('info-title');
            const content = document.getElementById('info-content');

            // Resetar tudo para o estado "apagado"
            groupFaces.children.forEach(c => { c.material.opacity = 0.05; c.material.color.set(0xd4af37); });
            groupBasePlane.children[0].material.opacity = 0.05;
            groupVertex.children[0].material.opacity = 0.3;
            groupHeight.visible = false;
            
            // Resetar arestas (tubos)
            [groupArestasBase, groupArestasLat].forEach(g => {
                g.children.forEach(c => {
                    c.scale.set(1, 1, 1); // Volta ao tamanho normal
                    c.material.color.set(0x2c3e50); // Cor escura
                    c.material.opacity = 0.2; // Translúcido
                });
            });

            if (type === 'Tudo') {
                title.innerText = "Visão Geral";
                content.innerText = "A pirâmide é formada pela junção do polígono da base com o vértice superior através de triângulos.";
                groupFaces.children.forEach(c => c.material.opacity = 0.3);
                groupBasePlane.children[0].material.opacity = 0.15;
                groupVertex.children[0].material.opacity = 1;
                [groupArestasBase, groupArestasLat].forEach(g => g.children.forEach(c => c.material.opacity = 0.6));
            } 
            else if (type === 'Vertice') {
                title.innerText = "Vértice (H)";
                content.innerText = "É o ponto de convergência de todas as arestas laterais. Também chamado de Ápice.";
                groupVertex.children[0].material.opacity = 1;
                groupVertex.children[0].material.color.set(0xe84118); // Vermelho vibrante
            }
            else if (type === 'Base') {
                title.innerText = "Base (ABCDEF)";
                content.innerText = "O polígono plano que sustenta a pirâmide. O número de lados define o tipo da pirâmide (neste caso, Hexagonal).";
                groupBasePlane.children[0].material.opacity = 0.8;
                groupArestasBase.children.forEach(c => { c.material.color.set(0x005088); c.material.opacity = 1; });
            }
            else if (type === 'Faces') {
                title.innerText = "Faces Laterais";
                content.innerText = "Superfícies triangulares (AHB, BHC...) formadas pelas arestas da base e as arestas laterais.";
                groupFaces.children.forEach(c => { c.material.opacity = 0.8; c.material.color.set(0xd4af37); });
            }
            else if (type === 'ArestasBase') {
                title.innerText = "Arestas da Base";
                content.innerText = "Os 6 segmentos (tubos vermelhos) que formam o contorno do polígono no chão (AB, BC, CD...).";
                groupArestasBase.children.forEach(c => { 
                    c.material.color.set(0xe84118); // Laranja avermelhado muito forte
                    c.material.opacity = 1; 
                    c.scale.set(1.5, 1, 1.5); // Engrossa o tubo
                });
            }
            else if (type === 'ArestasLat') {
                title.innerText = "Arestas Laterais";
                content.innerText = "Os segmentos (tubos vermelhos) que formam o 'esqueleto' subindo da base até o vértice H.";
                groupArestasLat.children.forEach(c => { 
                    c.material.color.set(0xe84118); // Laranja avermelhado muito forte
                    c.material.opacity = 1; 
                    c.scale.set(1.5, 1, 1.5); // Engrossa o tubo
                });
            }
            else if (type === 'Altura') {
                title.innerText = "Altura (h)";
                content.innerText = "O segmento vertical e perpendicular (tracejado) que liga o vértice H ao centro exato da base.";
                groupHeight.visible = true;
                groupBasePlane.children[0].material.opacity = 0.2; // Deixa a base visível para ver onde a altura bate
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Sincroniza letras HTML com o mundo 3D
            labels.forEach(label => {
                const vector = label.pos.clone();
                vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = -(vector.y * 0.5 - 0.5) * window.innerHeight;
                label.element.style.left = `${x}px`;
                label.element.style.top = `${y}px`;
                label.element.style.display = (vector.z > 1) ? 'none' : 'block';
            });

            renderer.render(scene, camera);
        }

        highlight('Tudo');
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
