<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirâmides - MATMOV</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fffaf1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: #005088;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 56px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: thin;
            scrollbar-color: #d4af37 transparent;
        }

        header::-webkit-scrollbar { height: 4px; }
        header::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 2px; }

        .logo {
            color: #d4af37;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            white-space: nowrap;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .divider {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.25);
            flex-shrink: 0;
            margin: 0 4px;
        }

        nav {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        nav button {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.75);
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
            line-height: 1.3;
            text-align: center;
        }

        nav button:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        nav button.active {
            background: #d4af37;
            color: #003560;
            font-weight: 700;
        }

        /* ── Page number badge ── */
        nav button .num {
            display: inline-block;
            font-size: 0.65rem;
            opacity: 0.65;
            margin-right: 4px;
        }

        nav button.active .num {
            opacity: 0.8;
        }

        /* ── Content area ── */
        #frame-container {
            flex: 1;
            position: relative;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        iframe.visible {
            display: block;
        }
    </style>
</head>
<body>

<header>
    <span class="logo">MATMOV</span>
    <div class="divider"></div>
    <nav id="nav"></nav>
</header>

<div id="frame-container" id="frames"></div>

<script>
    const pages = [
        { file: 'piramides/001_piramides.html',                      label: 'Simulador Hexagonal' },
        { file: 'piramides/002_classificacao_piramides.html',         label: 'Classificação' },
        { file: 'piramides/003_desafio_classificacao_piramides.html', label: 'Desafio' },
        { file: 'piramides/004_visualizador_apotemas_pitagoras.html', label: 'Apótemas' },
        { file: 'piramides/005_piramides_semelhantes.html',           label: 'Tronco & Secção' },
        { file: 'piramides/006_semelhanca.html',                     label: 'Semelhança' },
    ];

    const nav = document.getElementById('nav');
    const container = document.getElementById('frame-container');
    let current = null;

    pages.forEach((page, i) => {
        // Create iframe (lazy-loaded on first visit)
        const iframe = document.createElement('iframe');
        iframe.dataset.src = page.file;
        iframe.title = page.label;
        container.appendChild(iframe);

        // Create nav button
        const btn = document.createElement('button');
        btn.innerHTML = `<span class="num">${String(i + 1).padStart(2, '0')}</span>${page.label}`;
        btn.addEventListener('click', () => activate(i));
        nav.appendChild(btn);
    });

    function activate(index) {
        const iframes = container.querySelectorAll('iframe');
        const buttons = nav.querySelectorAll('button');

        if (current !== null) {
            iframes[current].classList.remove('visible');
            buttons[current].classList.remove('active');
        }

        const iframe = iframes[index];
        // Lazy-load: set src only on first visit
        if (!iframe.src || iframe.src === window.location.href) {
            iframe.src = iframe.dataset.src;
        }
        iframe.classList.add('visible');
        buttons[index].classList.add('active');
        current = index;

        // Scroll button into view in case header overflows
        buttons[index].scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
    }

    // Start on first page
    activate(0);
</script>

</body>
</html>
